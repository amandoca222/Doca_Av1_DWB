<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Music App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-5">

  <h1 class="text-center mb-4 text-white">🎧 Music Finder</h1>

  <!-- BUSCA -->
  <div class="input-group mb-4">
    <input type="text" id="artista" class="form-control" placeholder="Digite artista (Coldplay, Drake...)">
    <button class="btn btn-success" onclick="buscarDados()">Buscar</button>
  </div>

  <div id="loading" class="text-center text-white" style="display:none;">
    <div class="spinner-border text-success"></div>
  </div>

  <div id="error" class="text-danger text-center mb-3"></div>

  <div id="cards" class="row"></div>

</div>

<script src="js/script.js"></script>
</body>
</html>
